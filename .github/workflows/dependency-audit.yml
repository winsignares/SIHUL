name: Dependency Audit

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"  # Semanal, lunes 03:00 UTC

jobs:
  python-audit:
    name: Python Audit (backend + chatbot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: pip-audit backend
        run: pip-audit -r backend/requirements.txt

      - name: pip-audit chatbot
        run: pip-audit -r chatbot/requirements.txt

      - name: safety backend
        run: safety check -r backend/requirements.txt

      - name: safety chatbot
        run: safety check -r chatbot/requirements.txt

  node-audit:
    name: Node Audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci

      - name: npm audit (fail on High/Critical)
        run: npm audit --omit=dev --audit-level=high
