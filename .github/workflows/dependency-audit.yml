name: Dependency Audit

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"  # Semanal, lunes 03:00 UTC

jobs:
  python-audit:
    name: Python Audit (backend + chatbot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: pip-audit backend
        run: pip-audit -r backend/requirements.txt

      - name: pip-audit chatbot
        run: pip-audit -r chatbot/requirements.txt

      - name: safety backend
        run: safety check -r backend/requirements.txt

      - name: safety chatbot
        run: safety check -r chatbot/requirements.txt

  node-audit:
    name: Node Audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci

      - name: npm audit (fail on High/Critical, excluding unfixable xlsx)
        run: |
          npm audit --omit=dev --json > audit.json 2>&1 || true
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const vulns = Object.entries(data.vulnerabilities || {});
          const nonXlsxVulns = vulns.filter(([key, vuln]) => !key.includes('xlsx'));
          
          if (nonXlsxVulns.length > 0) {
            console.error('❌ Found non-xlsx vulnerabilities:');
            nonXlsxVulns.forEach(([key, vuln]) => {
              console.error(\`  - \${key}: \${vuln.severity}\`);
            });
            process.exit(1);
          }
          
          if (vulns.length > 0 && vulns.some(([key]) => key.includes('xlsx'))) {
            console.log('⚠️  Note: xlsx has unfixable HIGH vulnerabilities (known and accepted risk)');
            console.log('   See: GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9');
            process.exit(0);
          }
          
          console.log('✅ No vulnerabilities found');
          process.exit(0);
          "
