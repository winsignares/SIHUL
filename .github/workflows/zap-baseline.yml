name: ZAP Baseline (Passive)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly at 04:00 UTC

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start local stack (nginx only sample)
        run: |
          docker compose -f docker-compose.yml up -d nginx backend db
          # Wait for backend health
          sleep 15

      - name: Run ZAP Baseline against local nginx
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8081'
          cmd_options: '-d -a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html
