server {
    listen 80;
    listen [::]:80;

    server_name sihul.unilibre.edu.co;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name sihul.unilibre.edu.co;
    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/sihul.unilibre.edu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sihul.unilibre.edu.co/privkey.pem;

    root /var/www/sihul;
    index index.html;

    # Assets del build de Vite.
    # Importante: si falta un .js/.css, devolver 404 y NO index.html.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Evita que el navegador se quede con index.html viejo que apunta a chunks antiguos.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Archivos estáticos raíz si existen: favicon, manifest, imágenes, etc.
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|css|js|map|json|txt|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
    }

    # Endpoints legacy de usuarios: frontend llama /api/usuarios/login/
    # pero Django los tiene como /usuarios/login/
    location ~ ^/api/usuarios/(login|logout|session-auth-state|change-password)/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API moderna: mantiene prefijo /api
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://sihul.unilibre.edu.co" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
             }
    }

    # OAuth Microsoft via django-allauth.
    # Azure debe usar: https://sihul.unilibre.edu.co/accounts/microsoft/login/callback/
    location /accounts/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Archivos subidos por usuarios (documentos de facturas)
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # SPA React Router: cualquier ruta de frontend cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
