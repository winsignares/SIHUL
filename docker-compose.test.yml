# Isolated SIHUL test/staging stack.
# Run with:
# docker compose --env-file .env.test -f docker-compose.test.yml up -d --build

name: ${COMPOSE_PROJECT_NAME:-sihul-test}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ./.env.test
    environment:
      POSTGRES_DB: ${DB_NAME:-sihul_test_db}
      POSTGRES_USER: ${DB_USER:-sihul_test_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sihul_test_password}
    ports:
      - "${TEST_POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - sihul_test_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.test
    environment:
      APP_ENV: ${APP_ENV:-test}
      DJANGO_SETTINGS_MODULE: mysite.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-test-only-sihul}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,10.4.100.146}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-sihul_test_db}
      DB_USER: ${DB_USER:-sihul_test_user}
      DB_PASSWORD: ${DB_PASSWORD:-sihul_test_password}
      FRONTEND_URL: ${FRONTEND_URL:-http://10.4.100.146:5273}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5273,http://127.0.0.1:5273,http://10.4.100.146:5273}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5273,http://127.0.0.1:5273,http://10.4.100.146:5273}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sihul_test_sessionid}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-sihul_test_csrftoken}
      CHATBOT_FASTAPI_URL: http://chatbot:8001/api/v1
      FINANCIERO_DOCUMENT_ROOT: /app/test-media
      PYTHONUNBUFFERED: "1"
    command:
      - sh
      - -c
      - >
        until pg_isready -h "$$DB_HOST" -p "$$DB_PORT" -U "$$DB_USER"; do
          echo "Waiting for test database...";
          sleep 2;
        done;
        python manage.py migrate --noinput;
        python manage.py runserver 0.0.0.0:8000
    ports:
      - "${TEST_BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend:/app
      - backend_test_media:/app/test-media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_test_network

  chatbot:
    build:
      context: .
      dockerfile: chatbot.Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sihul_test_user}:${DB_PASSWORD:-sihul_test_password}@db:5432/${DB_NAME:-sihul_test_db}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${TEST_CHATBOT_PORT:-8101}:8001"
    volumes:
      - ./chatbot:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_test_network

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      VITE_PORT: "5173"
      VITE_HMR_HOST: ${TEST_PUBLIC_HOST:-10.4.100.146}
      VITE_HMR_CLIENT_PORT: ${TEST_FRONTEND_PORT:-5273}
      VITE_PROXY_TARGET: http://backend:8000
      VITE_API_URL: ""
      VITE_CHATBOT_URL: http://${TEST_PUBLIC_HOST:-10.4.100.146}:${TEST_CHATBOT_PORT:-8101}
      TZ: America/Bogota
    ports:
      - "${TEST_FRONTEND_PORT:-5273}:5173"
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    depends_on:
      - backend
      - chatbot
    networks:
      - sihul_test_network
    stdin_open: true
    tty: true

volumes:
  postgres_test_data:
  backend_test_media:
  frontend_test_node_modules:

networks:
  sihul_test_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${TEST_DOCKER_NETWORK_SUBNET:-10.202.10.0/24}
          gateway: ${TEST_DOCKER_NETWORK_GATEWAY:-10.202.10.1}
