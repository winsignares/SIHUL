# ============================================
# DOCKER COMPOSE - STACK COMPLETO SIHUL
# Sistema de Horarios Universidad Libre
# ============================================

name: sihul

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL + PGVECTOR
  # ==========================================
  db:
    container_name: postgres_db
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mypostgresdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - sihul_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mypostgresdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PGADMIN - ADMINISTRACIÓN DE POSTGRESQL
  # ==========================================
  pgadmin:
    container_name: sihul-pgadmin
    image: dpage/pgadmin4:8
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_network

  # ==========================================
  # BACKEND DJANGO
  # ==========================================
  backend:
    container_name: sihul-backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
    environment:
      # Database (usa los mismos valores que el servicio db)
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_NAME: ${DB_NAME:-mypostgresdb}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-unsafe-do-not-use-in-prod}
      # reCAPTCHA
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      # ChatBot
      CHATBOT_FASTAPI_URL: ${CHATBOT_FASTAPI_URL:-http://chatbot:8001/api/v1}
      # Python
      PYTHONUNBUFFERED: "1"
      # Memoria
      PYTHONHASHSEED: "random"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_network

  # ==========================================
  # CHATBOT FASTAPI + RAG
  # ==========================================
  chatbot:
    container_name: sihul-chatbot
    build:
      context: .
      dockerfile: chatbot.Dockerfile
    restart: unless-stopped
    env_file:
      - ./chatbot/.env
    ports:
      - "8001:8001"
    volumes:
      - ./chatbot:/app
    environment:
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_network  

  # ==========================================
  # FRONTEND REACT + VITE
  # ==========================================
  frontend:
    container_name: react_vite_app
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      # Código fuente montado para hot-reload
      - ./frontend:/app
      # Volumen anónimo para node_modules (solo en contenedor)
      - /app/node_modules
    environment:
      NODE_ENV: "development"
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: "5173"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
      VITE_CHATBOT_URL: ${VITE_CHATBOT_URL:-http://localhost:8001}
      TZ: "America/Bogota"
    depends_on:
      - backend
      - chatbot
    networks:
      - sihul_network
    stdin_open: true
    tty: true

  # ==========================================
  # NGINX - FRONTEND ESTÁTICO + PROXY API (LOCAL)
  # ==========================================
  nginx:
    container_name: sihul-nginx
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./frontend/dist:/var/www/sihul:ro
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sihul_network

  # ==========================================
  # N8N - AUTOMATIZACIÓN DE WORKFLOWS
  # ==========================================
  # n8n:
  #   container_name: sihul-n8n
  #   image: n8nio/n8n
  #   restart: always
  #   ports:
  #     - "5678:5678"
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   networks:
  #     - sihul_network

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    name: sihul_postgres_data
    driver: local
  pgadmin_data:
    name: sihul_pgadmin_data
    driver: local
  # n8n_data:
  #   name: sihul_n8n_data
  #   driver: local

# ==========================================
# RED COMPARTIDA
# ==========================================
networks:
  sihul_network:
    name: sihul_network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-10.201.2.0/24}
          gateway: ${DOCKER_NETWORK_GATEWAY:-10.201.2.1}