# ============================================
# DOCKER COMPOSE - STACK COMPLETO SIHUL
# Sistema de Horarios Universidad Libre
# ============================================

name: sihul

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL + PGVECTOR
  # ==========================================
  db:
    container_name: postgres_db
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mypostgresdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sihul_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mypostgresdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND DJANGO
  # ==========================================
  backend:
    container_name: sihul-backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
      # Archivos subidos por usuarios (media) — volumen persistente
      - sihul_media:/app/media
    env_file:
      - ./.env
    environment:
      # Database (usa los mismos valores que el servicio db)
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: mypostgresdb
      # Python
      PYTHONUNBUFFERED: "1"
      # Directorio local donde Django guarda los archivos subidos
      FINANCIERO_DOCUMENT_ROOT: /app/media
      # Almacenamiento compartido NAS Universidad Libre
      FINANCIERO_DOCUMENT_NETWORK_ROOT: ${FINANCIERO_DOCUMENT_NETWORK_ROOT}
      FINANCIERO_DOCUMENT_NETWORK_USER: ${FINANCIERO_DOCUMENT_NETWORK_USER}
      FINANCIERO_DOCUMENT_NETWORK_PASSWORD: ${FINANCIERO_DOCUMENT_NETWORK_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_network

  # ==========================================
  # CHATBOT FASTAPI + RAG
  # ==========================================
  chatbot:
    container_name: sihul-chatbot
    build:
      context: .
      dockerfile: chatbot.Dockerfile
    restart: unless-stopped
    env_file:
      - ./chatbot/.env
    ports:
      - "8001:8001"
    volumes:
      - ./chatbot:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:mysecretpassword@db:5432/mypostgresdb
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sihul_network  

  # ==========================================
  # FRONTEND REACT + VITE
  # ==========================================
  frontend:
    container_name: react_vite_app
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      # Código fuente montado para hot-reload
      - ./frontend:/app
      # Volumen anónimo para node_modules (solo en contenedor)
      - /app/node_modules
    environment:
      NODE_ENV: "development"
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: "5173"
      VITE_API_URL: "http://localhost:8000"
      VITE_CHATBOT_URL: "http://localhost:8001"
      TZ: "America/Bogota"
    depends_on:
      - backend
      - chatbot
    networks:
      - sihul_network
    stdin_open: true
    tty: true

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    name: sihul_postgres_data
    driver: local
  n8n_data:
    name: sihul_n8n_data
    driver: local
  sihul_media:
    name: sihul_media
    driver: local

# ==========================================
# RED COMPARTIDA
# ==========================================
networks:
  sihul_network:
    name: sihul_network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-10.201.2.0/24}
          gateway: ${DOCKER_NETWORK_GATEWAY:-10.201.2.1}