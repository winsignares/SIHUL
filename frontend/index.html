<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon en diferentes tamaños -->
  <link rel="icon" type="image/webp" sizes="32x32" href="/LogoUniversidadLibre2.webp" />
  <link rel="icon" type="image/webp" sizes="16x16" href="/LogoUniversidadLibre2.webp" />
  <link rel="apple-touch-icon" sizes="180x180" href="/LogoUniversidadLibre2.webp" />
  <link rel="icon" type="image/webp" sizes="192x192" href="/LogoUniversidadLibre2.webp" />
  <link rel="icon" type="image/webp" sizes="512x512" href="/LogoUniversidadLibre2.webp" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIHUL</title>
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      const target = 'Download the React DevTools for a better development experience';
      const shouldFilter = function (args) {
        return typeof args[0] === 'string' && args[0].includes(target);
      };

      const originalInfo = console.info;
      console.info = function (...args) {
        if (shouldFilter(args)) return;
        originalInfo.apply(console, args);
      };

      const originalLog = console.log;
      console.log = function (...args) {
        if (shouldFilter(args)) return;
        originalLog.apply(console, args);
      };
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
