server {
    listen 80;
    listen [::]:80;

    server_name sihul.unilibre.edu.co;

    return 301 https://sihul.unilibre.edu.co$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name sihul.unilibre.edu.co;
    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/sihul.unilibre.edu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sihul.unilibre.edu.co/privkey.pem;

    root /var/www/sihul;
    index index.html;

    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; connect-src 'self' https: wss:;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Endpoints legacy de usuarios (backend fuera de /api)
    location ~ ^/api/usuarios/(login|logout|session-auth-state|change-password)/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host sihul.unilibre.edu.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Server;
    }

    # API moderna: mantener prefijo /api para DRF y api_urls
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;

        proxy_set_header Host sihul.unilibre.edu.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Server;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
    }

    # Archivos subidos por usuarios — proxy al backend Django
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Archivos PDF/imagen pueden ser grandes
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
